<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HDFC vs ICICI Comparison</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
       
    body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px 0;
    }
    
    .comparison-container {
        max-width: 1600px;
        margin: 0 auto;
        padding: 0 20px;
    }
    
    .header-section {
        text-align: center;
        color: white;
        margin-bottom: 2rem;
    }
    
    .header-section h1 {
        font-size: 2.5rem;
        font-weight: 700;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    
    .comparison-card {
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        overflow: hidden;
        margin-bottom: 2rem;
    }
    
    .card-header {
        background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        color: white;
        padding: 1.5rem;
        text-align: center;
    }
    
    .action-buttons {
        display: flex;
        gap: 1rem;
        justify-content: center;
        padding: 1.5rem;
        background: #f8f9fa;
    }
    
    .action-btn {
        background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        border: none;
        border-radius: 50px;
        padding: 0.8rem 1.8rem;
        color: white;
        text-decoration: none;
        font-weight: 600;
        transition: all 0.3s ease;
    }
    
    .action-btn:hover {
        transform: translateY(-2px);
        color: white;
    }
    
    .vs-divider {
        text-align: center;
        padding: 2rem 0;
        font-size: 3rem;
        font-weight: 700;
        color: #1e3c72;
    }
    
    .bank-section {
        padding: 2rem;
    }
    
    .bank-title {
        font-size: 1.8rem;
        font-weight: 700;
        margin-bottom: 1.5rem;
        color: #1e3c72;
        text-align: center;
    }
    
    .hdfc-section {
        border-left: 5px solid #007bff;
    }
    
    .icici-section {
        border-left: 5px solid #28a745;
    }
    
    .table-responsive {
        max-height: 60vh;
        overflow-y: auto;
        overflow-x: auto;
    }
    
    .table {
        font-size: 0.85rem;
        margin-bottom: 0;
        border-collapse: separate;
        border-spacing: 0;
    }
    
    /* Header styling with sticky position */
    .table thead th {
        background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
        color: white;
        position: sticky;
        top: 0;
        z-index: 10;
        padding: 15px 12px;
        font-weight: 600;
        border: none;
        white-space: nowrap;
    }
    
    /* Color specific header columns */
    .table thead th:nth-child(1) { /* Sr.No */
        background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
    }
    
    .table thead th:nth-child(2) { /* Particulars */
        background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
    }
    
    .table thead th:nth-child(3) { /* As_Per_CWI_Amount */
        background: linear-gradient(135deg, #d97706 0%, #ea580c 100%) !important;
    }
    
    .table thead th:nth-child(4) { /* Rate_per_sqfeet */
        background: linear-gradient(135deg, #d97706 0%, #ea580c 100%) !important;
    }
    
    .table thead th:nth-child(5) { /* Sq_Feet_Range */
        background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
    }
    
    .table thead th:nth-child(6) { /* Is_Valid */
        background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
    }
    
    .table thead th:nth-child(7) { /* CWI_Validation */
        background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%) !important;
    }
    
    .table thead th:nth-child(8) { /* Rate_Validation */
        background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%) !important;
    }
    
    .table thead th:nth-child(9) { /* CWI_Weighted_Min */
        background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
    }
    
    .table thead th:nth-child(10) { /* CWI_Weighted_Max */
        background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
    }
    
    .table thead th:nth-child(11) { /* Rate_Weighted_Min */
        background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
    }
    
    .table thead th:nth-child(12) { /* Rate_Weighted_Max */
        background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
    }
    
    /* Body cell styling with alternating background */
    .table tbody tr {
        transition: all 0.3s ease;
    }
    
    .table tbody tr:nth-child(odd) {
        background-color: #f8f9fa;
    }
    
    .table tbody tr:nth-child(even) {
        background-color: #ffffff;
    }
    
    .table tbody tr:hover {
        background-color: #e3f2fd !important;
        transform: scale(1.01);
    }
    
    .table tbody td {
        padding: 12px;
        border-bottom: 1px solid #e0e0e0;
        vertical-align: middle;
    }
    
    /* Color specific body columns with light backgrounds */
    .table tbody td:nth-child(3) { /* As_Per_CWI_Amount */
        background-color: #fff7ed !important;
        font-weight: 600;
    }
    
    .table tbody td:nth-child(4) { /* Rate_per_sqfeet */
        background-color: #fff7ed !important;
        font-weight: 600;
    }
    
    .table tbody td:nth-child(7) { /* CWI_Validation */
        background-color: #f5f3ff !important;
        font-size: 0.8rem;
    }
    
    .table tbody td:nth-child(8) { /* Rate_Validation */
        background-color: #f5f3ff !important;
        font-size: 0.8rem;
    }
    
    /* Valid/Invalid badges */
    .table tbody td:nth-child(6) { /* Is_Valid column */
        font-weight: 600;
        text-align: center;
    }
    
    /* Responsive adjustments */
    @media (max-width: 1200px) {
        .table {
            font-size: 0.75rem;
        }
        
        .table thead th,
        .table tbody td {
            padding: 8px;
        }
    }

    </style>
</head>
<body>
    <div class="comparison-container">
        <div class="header-section">
            <h1><i class="fas fa-exchange-alt"></i> HDFC vs ICICI Bank Comparison</h1>
            <p>Grouped Per Sq.Feet Validation Results</p>
        </div>
        
        <div class="comparison-card">
            <div class="card-header">
                <h2>Validation Comparison Report</h2>
            </div>
            
            <div class="action-buttons">
                <a href="{{ url_for('download_file', filename=hdfc_report) }}" class="action-btn">
                    <i class="fas fa-download"></i> Download HDFC Report
                </a>
                <a href="{{ url_for('download_file', filename=icici_report) }}" class="action-btn">
                    <i class="fas fa-download"></i> Download ICICI Report
                </a>
                <a href="/" class="action-btn" style="background: linear-gradient(135deg, #6c757d 0%, #495057 100%);">
                    <i class="fas fa-upload"></i> Validate Another File
                </a>
            </div>
            
            <!-- HDFC Section -->
            <div class="bank-section hdfc-section">
                <div class="bank-title">
                    <i class="fas fa-building" style="color: #007bff;"></i> HDFC Bank
                </div>
                <div class="table-responsive">
                    {{ hdfc_table|safe }}
                </div>
            </div>
            
            <!-- VS Divider -->
            <div class="vs-divider">
                <i class="fas fa-not-equal"></i> VS
            </div>
            
            <!-- ICICI Section -->
            <div class="bank-section icici-section">
                <div class="bank-title">
                    <i class="fas fa-building" style="color: #28a745;"></i> ICICI Bank
                </div>
                <div class="table-responsive">
                    {{ icici_table|safe }}
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
